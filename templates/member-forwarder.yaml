AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Member account resources for AWS Backup DevOps Agent.
  Deployed via StackSet from the delegated admin account to ALL regions.
  EventBridge forwarding rule deploys in every region.
  All events forward to delegated admin's us-east-1 bus (where Lambda lives).
  IAM roles deploy only in us-east-1 (IAM is global).

Parameters:
  DelegatedAdminAccountId:
    Type: String
    Description: Account ID of the delegated admin (where Lambda and Agent live)
  CentralRegion:
    Type: String
    Default: us-east-1
    Description: Region where the main stack (Lambda + EventBus policy) is deployed

Conditions:
  IsNotDelegatedAdmin: !Not [!Equals [!Ref "AWS::AccountId", !Ref DelegatedAdminAccountId]]
  # IAM roles are global - only create in us-east-1 to avoid naming conflicts
  IsIAMRegion: !Equals [!Ref "AWS::Region", "us-east-1"]
  CreateEventBridge: !Condition IsNotDelegatedAdmin
  CreateIAM: !And
    - !Condition IsNotDelegatedAdmin
    - !Condition IsIAMRegion

Resources:
  # ─────────────────────────────────────────────────────────────────
  # EventBridge rule - deploys in EVERY region (regional resource)
  # ALL regions forward to the CENTRAL region (us-east-1) in the
  # delegated admin where the Lambda + event bus policy lives.
  # ─────────────────────────────────────────────────────────────────
  ForwardingRule:
    Type: AWS::Events::Rule
    Condition: CreateEventBridge
    Properties:
      Name: ForwardBackupFailures-ToCentral
      Description: Forwards failed backup/copy events to delegated admin for investigation
      State: ENABLED
      EventPattern:
        source:
          - aws.backup
        detail-type:
          - Backup Job State Change
          - Copy Job State Change
        detail:
          state:
            - FAILED
            - ABORTED
            - EXPIRED
      Targets:
        - Id: DelegatedAdminBus
          Arn: !Sub arn:aws:events:${CentralRegion}:${DelegatedAdminAccountId}:event-bus/default
          RoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/BackupEventForwardingRole

  # ─────────────────────────────────────────────────────────────────
  # IAM Roles - created ONCE in us-east-1 only (IAM is global)
  # DeletionPolicy: Retain ensures roles survive accidental stack deletion
  # ─────────────────────────────────────────────────────────────────
  ForwardingRole:
    Type: AWS::IAM::Role
    Condition: CreateIAM
    DeletionPolicy: Retain
    Properties:
      RoleName: BackupEventForwardingRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ForwardEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub arn:aws:events:${CentralRegion}:${DelegatedAdminAccountId}:event-bus/default

  # Investigation role - allows DevOps Agent to assume into member accounts
  # for root cause analysis via CloudTrail, Backup, KMS, IAM, Config, EC2, RDS
  InvestigationRole:
    Type: AWS::IAM::Role
    Condition: CreateIAM
    DeletionPolicy: Retain
    Properties:
      RoleName: DevOpsAgentInvestigationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${DelegatedAdminAccountId}:role/DevOpsAgentBackupRole
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackupInvestigationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  # AWS Backup - full read for job details
                  - backup:Describe*
                  - backup:Get*
                  - backup:List*
                  # KMS - check key policies for access issues
                  - kms:DescribeKey
                  - kms:GetKeyPolicy
                  - kms:ListGrants
                  - kms:ListKeyPolicies
                  # IAM - verify role permissions
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  # CloudTrail - find RCA from event history
                  - cloudtrail:LookupEvents
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetEventSelectors
                  # Config - resource configuration history
                  - config:GetResourceConfigHistory
                  - config:BatchGetResourceConfig
                  - config:GetComplianceDetailsByResource
                  # EC2 - check volume/instance/snapshot state
                  - ec2:DescribeVolumes
                  - ec2:DescribeInstances
                  - ec2:DescribeSnapshots
                  - ec2:DescribeImages
                  # RDS - check DB instance/snapshot state
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                  - rds:DescribeDBClusters
                  - rds:DescribeDBClusterSnapshots
                  # EFS/FSx - check filesystem state
                  - elasticfilesystem:DescribeFileSystems
                  - fsx:DescribeFileSystems
                  - fsx:DescribeBackups
                  # DynamoDB - check table state
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeBackup
                  - dynamodb:ListBackups
                  # S3 - check bucket for S3 backup issues
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:GetBucketVersioning
                Resource: '*'
