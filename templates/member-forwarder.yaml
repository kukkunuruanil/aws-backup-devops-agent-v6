AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Member account resources for AWS Backup DevOps Agent.
  Deployed via StackSet from the delegated admin account to ALL regions.
  Creates: EventBridge forwarding rule (every region) + IAM roles (once, since IAM is global).

Parameters:
  DelegatedAdminAccountId:
    Type: String
    Description: Account ID of the delegated admin (where Lambda and Agent live)

Conditions:
  IsNotDelegatedAdmin: !Not [!Equals [!Ref "AWS::AccountId", !Ref DelegatedAdminAccountId]]
  # IAM roles are global - only create them in us-east-1 to avoid conflicts
  IsIAMRegion: !Equals [!Ref "AWS::Region", "us-east-1"]
  CreateIAM: !And
    - !Condition IsNotDelegatedAdmin
    - !Condition IsIAMRegion

Resources:
  # ─────────────────────────────────────────────────────────────────
  # EventBridge rule - deploys in EVERY region
  # Forwards failed backup/copy events to the delegated admin's
  # event bus in the SAME region, triggering the DevOps Agent.
  # ─────────────────────────────────────────────────────────────────
  ForwardingRule:
    Type: AWS::Events::Rule
    Condition: IsNotDelegatedAdmin
    Properties:
      Name: ForwardBackupFailures-ToCentral
      Description: Forwards failed backup/copy events to delegated admin for investigation
      State: ENABLED
      EventPattern:
        source:
          - aws.backup
        detail-type:
          - Backup Job State Change
          - Copy Job State Change
        detail:
          state:
            - FAILED
      Targets:
        - Id: DelegatedAdminBus
          Arn: !Sub arn:aws:events:${AWS::Region}:${DelegatedAdminAccountId}:event-bus/default
          RoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/BackupEventForwardingRole

  # ─────────────────────────────────────────────────────────────────
  # IAM Roles - created ONCE (us-east-1 only, IAM is global)
  # ─────────────────────────────────────────────────────────────────
  ForwardingRole:
    Type: AWS::IAM::Role
    Condition: CreateIAM
    Properties:
      RoleName: BackupEventForwardingRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ForwardEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub arn:aws:events:*:${DelegatedAdminAccountId}:event-bus/default

  # Investigation role - allows DevOps Agent to assume into member accounts
  # for RCA via CloudTrail, Backup APIs, KMS, IAM, and Config
  InvestigationRole:
    Type: AWS::IAM::Role
    Condition: CreateIAM
    Properties:
      RoleName: DevOpsAgentInvestigationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${DelegatedAdminAccountId}:role/DevOpsAgentBackupRole
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackupInvestigationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - backup:Describe*
                  - backup:Get*
                  - backup:List*
                  - kms:DescribeKey
                  - kms:GetKeyPolicy
                  - kms:ListGrants
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - cloudtrail:LookupEvents
                  - cloudtrail:GetTrailStatus
                  - cloudtrail:DescribeTrails
                  - config:GetResourceConfigHistory
                  - config:BatchGetResourceConfig
                  - ec2:DescribeVolumes
                  - ec2:DescribeInstances
                  - ec2:DescribeSnapshots
                  - rds:DescribeDBInstances
                  - rds:DescribeDBSnapshots
                Resource: '*'
